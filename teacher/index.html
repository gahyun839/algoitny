<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알고리즘 교사 대시보드</title>
    <style>
        body { font-family: '맑은 고딕', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #1e88e5; text-align: center; margin-bottom: 5px; }
        .date-display { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; font-weight: bold; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #1e88e5; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; background: #e3f2fd; border: none; cursor: pointer; font-size: 16px; font-weight: bold; color: #1e88e5; }
        .tab-btn.active { background: #1e88e5; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; }
        textarea { height: 100px; resize: none; }
        button { background-color: #1e88e5; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1565c0; }
        .box { padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fafafa; border: 1px solid #ddd; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .item-details { background: white; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        .item-details summary { padding: 12px; font-weight: bold; cursor: pointer; background: #fdfdfd; border-bottom: 1px solid #f0f0f0; outline: none; }
        .item-details[open] summary { background: #f5f5f5; }
        .attendance-row { display: flex; align-items: center; margin-bottom: 6px; background: white; padding: 6px; border-radius: 6px; border: 1px solid #eaeaea; }
        .attendance-name { width: 90px; font-weight: bold; font-size: 13px; }
        .calendar-grid { display: flex; flex-wrap: wrap; gap: 4px; }
        .calendar-cell { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: #e0e0e0; border-radius: 4px; font-size: 9px; font-weight: bold; color: #777; }
        .calendar-cell.stamped { background: #4caf50; color: white; }
        .sos-alert { padding: 10px; margin-bottom: 15px; display: none; }
        .reset-btn { background: #757575; width: 100%; margin-top: 30px; }
        .reset-btn:hover { background: #424242; }
    </style>
</head>
<body>
    <div class="container">
        <h1>교사 대시보드</h1>
        <div id="currentDate" class="date-display"></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1')">문제 출제소</button>
            <button class="tab-btn" onclick="switchTab('tab2')">모니터링 및 출석</button>
            <button class="tab-btn" onclick="switchTab('tab3')">AI 학급 분석</button>
        </div>
        
        <div id="tab1" class="tab-content active">
            <div class="box">
                <input type="text" id="topicInput" placeholder="주제를 입력하십시오.">
                <select id="difficultySelect">
                    <option value="하">난이도: 하 (명시적 오류 1개)</option>
                    <option value="중" selected>난이도: 중 (오류 개수 명시)</option>
                    <option value="상">난이도: 상 (복합 오류, 개수 비명시)</option>
                </select>
                <button onclick="generateProblem()" style="width: 100%;">AI 문제 생성</button>
                <div id="resultText" style="margin-top:15px; white-space:pre-wrap;"></div>
                <button id="copyBtn" style="display:none; margin-top:10px; background:#ff9800; width:100%;" onclick="copyToTransfer()">⬇️ 문제만 가져오기</button>
            </div>
            <div class="box">
                <textarea id="taskToStudent" placeholder="검토 후 전송하십시오."></textarea>
                <button id="sendBtn" style="background:#e53935; width:100%;">학생에게 전송</button>
            </div>
        </div>
        
        <div id="tab2" class="tab-content">
            <div id="sosAlert" class="sos-alert"></div>
            <div class="box">
                <h3 style="margin-top:0;" id="attendanceTitle">월간 미션 출석 현황</h3>
                <div id="teacherAttendanceBoard">로딩 중...</div>
            </div>
            <div class="box">
                <h3>학생 기록 관리</h3>
                <div class="filter-bar">
                    <input type="date" id="dateFilter" onchange="renderMonitorList()">
                    <select id="filterType" onchange="renderMonitorList()">
                        <option value="all">전체 기록</option>
                        <option value="answer">풀이 현황</option>
                        <option value="activity">활동 내용</option>
                        <option value="evaluation">평가 기록</option>
                    </select>
                    <input type="text" id="searchName" placeholder="이름 검색" oninput="renderMonitorList()">
                </div>
                <div id="monitorList">기록 데이터를 확인 중입니다...</div>
            </div>
        </div>
        
        <div id="tab3" class="tab-content">
            <button id="analyzeBtn" style="width:100%;">AI 통합 분석 리포트 생성</button>
            <div id="analysisResult" class="box" style="margin-top:15px; white-space:pre-wrap; min-height:100px;">리포트 출력 공간</div>
        </div>
        <button class="reset-btn" onclick="resetAllData()">⚠️ 학급 데이터 전체 초기화</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // [필수] Firebase 설정
        const firebaseConfig = { apiKey: "AIzaSyDkZS6CPZwzj3Tyxe-6PuYCQrgRMl7ioqU", authDomain: "algowebapp-833f6.firebaseapp.com", projectId: "algowebapp-833f6", storageBucket: "algowebapp-833f6.firebasestorage.app", messagingSenderId: "519500102460", appId: "1:519500102460:web:655d740f7612cfe1ce7c39" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // 🚨 여기에 새로 발급받은 안전한 API 키를 넣어주세요! (따옴표 지워지지 않게 조심!)
        const API_KEY = "AQ.Ab8RN6ISRDlpHZwTRrXmqgmYyil6sH6gfZCJrz3GYNpIBN0A6A"; 

        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Seoul', year: 'numeric', month: 'numeric', day: 'numeric' });
        const parts = formatter.formatToParts(now);
        const kstYear = parseInt(parts.find(p => p.type === 'year').value);
        const kstMonth = parseInt(parts.find(p => p.type === 'month').value);
        const todayStr = `${kstYear}-${String(kstMonth).padStart(2,'0')}-${String(parts.find(p => p.type === 'day').value).padStart(2,'0')}`;
        const totalDays = new Date(kstYear, kstMonth, 0).getDate();
        
        document.getElementById('dateFilter').value = todayStr;
        document.getElementById('currentDate').innerText = `${kstYear}년 ${kstMonth}월 ${parts.find(p => p.type === 'day').value}일 (서울 기준)`;

        // 탭 전환 기능
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        };

        // ==========================================
        // 1. 학생 기록 데이터 실시간 수집 및 화면 렌더링
        // ==========================================
        let rawAnswers = []; let rawActivities = []; let rawEvals = [];

        onSnapshot(collection(db, "answers"), (snap) => { rawAnswers = []; snap.forEach(d => { let data = d.data(); data.id = d.id; rawAnswers.push(data); }); renderMonitorList(); });
        onSnapshot(collection(db, "activities"), (snap) => { rawActivities = []; snap.forEach(d => rawActivities.push(d.data())); renderMonitorList(); });
        onSnapshot(collection(db, "evaluations"), (snap) => { rawEvals = []; snap.forEach(d => rawEvals.push(d.data())); renderMonitorList(); });

        window.renderMonitorList = function() {
            const listDiv = document.getElementById('monitorList');
            const dFilter = document.getElementById('dateFilter').value;
            const fType = document.getElementById('filterType').value;
            const sName = document.getElementById('searchName').value.trim().toLowerCase();

            let combined = [];
            if (fType === 'all' || fType === 'answer') combined = combined.concat(rawAnswers.map(d => ({...d, _type: '풀이'})));
            if (fType === 'all' || fType === 'activity') combined = combined.concat(rawActivities.map(d => ({...d, _type: '활동'})));
            if (fType === 'all' || fType === 'evaluation') combined = combined.concat(rawEvals.map(d => ({...d, _type: '평가', name: d.evaluator}))); 

            let filtered = combined.filter(item => {
                const matchDate = !dFilter || item.date === dFilter;
                const matchName = !sName || (item.name && item.name.toLowerCase().includes(sName)) || (item.target && item.target.toLowerCase().includes(sName));
                return matchDate && matchName;
            });

            filtered.sort((a, b) => b.time - a.time);

            if (filtered.length === 0) {
                listDiv.innerHTML = '<p style="padding: 15px; color: #888; text-align: center;">해당 조건에 맞는 기록이 없습니다.</p>';
                return;
            }

            let html = '';
            filtered.forEach(item => {
                const timeStr = new Date(item.time).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const title = `[${item._type}] ${item.name} (${timeStr})`;
                let content = '';

                if (item._type === '풀이') {
                    const statusColor = item.status === '해결' ? '#2e8b57' : (item.status === '미해결' ? '#d32f2f' : '#1565c0');
                    content = `<b>상태:</b> <span style="color:${statusColor}; font-weight:bold;">${item.status}</span><br><br><b>제출 답안:</b><br><span style="white-space:pre-wrap;">${item.answer}</span>`;
                } else if (item._type === '활동') {
                    content = `<b>소속 / 역할:</b> ${item.group} / ${item.role}<br><b>자체 기여도:</b> ${item.scale}점<br><br><b>활동 내용:</b><br><span style="white-space:pre-wrap;">${item.details}</span>`;
                } else if (item._type === '평가') {
                    content = `<b>평가 종류:</b> ${item.type}<br><b>평가 대상:</b> ${item.target}<br><b>부여 점수:</b> ${item.scale}점<br><br><b>평가 의견:</b><br><span style="white-space:pre-wrap;">${item.comment}</span>`;
                }

                html += `<details class="item-details"><summary>${title}</summary><div style="padding:15px; font-size:14px; background:#fff; line-height:1.6;">${content}</div></details>`;
            });

            listDiv.innerHTML = html;
        };

        // ==========================================
        // 2. 출석판 실시간 생성 로직
        // ==========================================
        onSnapshot(collection(db, "attendance"), (snapshot) => {
            const board = document.getElementById('teacherAttendanceBoard');
            board.innerHTML = ''; 

            if (snapshot.empty) {
                board.innerHTML = '<p style="font-size: 13px; color: #888; padding: 10px 0;">아직 출석한 학생 데이터가 없습니다.</p>';
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id; 
                const sName = docId.split('_')[0]; 

                const row = document.createElement('div');
                row.className = 'attendance-row';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'attendance-name';
                nameDiv.innerText = sName;
                row.appendChild(nameDiv);

                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                for (let d = 1; d <= totalDays; d++) {
                    const cell = document.createElement('div');
                    cell.className = 'calendar-cell' + (data[d] ? ' stamped' : '');
                    cell.innerText = d;
                    grid.appendChild(cell);
                }

                row.appendChild(grid);
                board.appendChild(row);
            });
        });

        // ==========================================
        // 3. 🚨 SOS 수신 및 개별 힌트 전송 기능
        // ==========================================
        onSnapshot(collection(db, "sos"), (snapshot) => {
            const sosAlert = document.getElementById('sosAlert');
            let html = '';
            
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data.active === true) {
                    const studentName = docSnap.id;
                    const currentAns = data.currentAnswer || '입력된 내용 없음';
                    
                    html += `
                        <div style="background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ef5350;">
                            <div style="font-size: 16px; margin-bottom: 8px; color: #c62828;">🚨 <b>${studentName}</b> 학생의 SOS 요청</div>
                            <div style="background: #f9f9f9; padding: 10px; font-size: 14px; margin-bottom: 10px; border-radius: 4px; color: #333;">
                                <b>현재 작성 중인 풀이:</b><br><span style="white-space: pre-wrap;">${currentAns}</span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="hintInput_${studentName}" placeholder="${studentName} 학생에게 보낼 힌트를 입력하세요" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                                <button onclick="sendHint('${studentName}')" style="background: #e53935; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">힌트 전송</button>
                            </div>
                        </div>
                    `;
                }
            });

            if (html !== '') {
                sosAlert.innerHTML = html;
                sosAlert.style.display = 'block';
            } else {
                sosAlert.style.display = 'none';
            }
        });

        window.sendHint = async function(studentName) {
            const hintText = document.getElementById(`hintInput_${studentName}`).value;
            if (!hintText.trim()) return alert("힌트 내용을 입력하세요.");

            try {
                await setDoc(doc(db, "hints", studentName), { content: hintText, time: Date.now() });
                await setDoc(doc(db, "sos", studentName), { active: false }, { merge: true });
                alert(`${studentName} 학생에게 힌트를 전송했습니다!`);
            } catch (e) {
                alert("힌트 전송 중 오류 발생: " + e.message);
            }
        };

        // ==========================================
        // 4. AI 통합 분석 리포트 (2.5 버전 적용 완료)
        // ==========================================
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const resDiv = document.getElementById('analysisResult');
            const analyzeBtn = document.getElementById('analyzeBtn');

            const recentAnswers = rawAnswers.slice(-30);

            if (recentAnswers.length === 0) return resDiv.innerText = "분석할 학생 풀이 데이터가 없습니다.";

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "AI가 학생 풀이를 분석 중입니다...";
            resDiv.innerText = `분석 중... (최신 학생 풀이 ${recentAnswers.length}건 기준)`;
            resDiv.style.color = "#333"; 

            try {
                const simplifiedAnswers = recentAnswers.map(ans => ({
                    학생이름: ans.name,
                    채점결과: ans.status,
                    제출답안: ans.answer
                }));

                const promptText = `당신은 교사 보조 알고리즘 교육 전문가입니다. 오늘 날짜는 ${todayStr}입니다. 보고서 상단에 작성 일자를 오늘 날짜로 정확히 명시해 주십시오. 아래 제공된 학생들의 알고리즘 문제 풀이 데이터를 바탕으로, 학생들이 주로 어떤 부분에서 논리적 오류를 범하고 있는지 공통된 패턴을 분석하고, 다음 수업에서 어떤 부분을 중점적으로 지도하면 좋을지 교사를 위한 요약 보고서를 작성해 주십시오.\n\n[학생 풀이 데이터]\n${JSON.stringify(simplifiedAnswers, null, 2)}`;

                // 💡 2.5 버전으로 정상 요청
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: promptText }] }]
                    })
                });

                if (response.status === 503) throw new Error("구글 AI 서버가 일시적으로 과부하 상태입니다. 잠시 후 다시 시도해주세요. (503)");
                if (response.status === 400) throw new Error("데이터 전송 형식이 잘못되었습니다. (400)");
                if (response.status === 429) throw new Error("API 요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요. (429)");
                if (!response.ok) throw new Error(`서버 오류가 발생했습니다. (상태 코드: ${response.status})`);

                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { 
                resDiv.innerText = `🚨 분석 오류: ${e.message}`; 
                resDiv.style.color = "#d32f2f";
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "AI 통합 분석 리포트 생성";
            }
        });

        // ==========================================
        // 5. 문제 생성 및 과제 전송 기능 (2.5 버전 복구 완료)
        // ==========================================
        window.generateProblem = async function() {
            const topic = document.getElementById('topicInput').value;
            const difficulty = document.getElementById('difficultySelect').value;
            const resultText = document.getElementById('resultText');
            
            if (!topic.trim()) return alert("출제할 주제를 입력하십시오.");
            
            resultText.innerText = "AI가 문제를 출제하고 있습니다...";
            document.getElementById('copyBtn').style.display = 'none';

            try {
                // 💡 2.5 버전으로 복구
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: `주제: ${topic}, 난이도: ${difficulty}. 이 조건에 맞는 알고리즘 교육용 문제를 1개 출제해 줘.` }] }]
                    })
                });
                
                if (!response.ok) throw new Error(`API 요청 실패 (상태 코드: ${response.status})`);
                
                const data = await response.json();
                resultText.innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('copyBtn').style.display = 'block';
            } catch (e) {
                resultText.innerText = "문제 생성 중 오류가 발생했습니다: " + e.message;
            }
        };

        window.copyToTransfer = function() {
            const problemText = document.getElementById('resultText').innerText;
            document.getElementById('taskToStudent').value = problemText;
            alert("문제 내용이 하단 전송창으로 복사되었습니다.");
        };

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const taskText = document.getElementById('taskToStudent').value;
            if (!taskText.trim()) return alert("학생에게 전송할 내용을 입력하세요.");
            try {
                await setDoc(doc(db, "tasks", "currentTask"), { content: taskText });
                alert("과제가 학생들에게 성공적으로 전송되었습니다!");
            } catch (e) {
                alert("전송 실패: " + e.message);
            }
        });

        // ==========================================
        // 6. 전체 데이터 초기화 기능
        // ==========================================
        window.resetAllData = function() {
            if (confirm("⚠️ 정말로 학급의 모든 데이터를 초기화하시겠습니까? 이 작업은 복구할 수 없습니다.")) {
                alert("초기화 기능이 호출되었습니다. (Firebase 콘솔에서 직접 삭제를 권장합니다.)");
            }
        };

    </script>
</body>
</html>
