<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알고리즘 교사 대시보드</title>
    <style>
        body { font-family: '맑은 고딕', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #1e88e5; text-align: center; margin-bottom: 5px; }
        .date-display { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; font-weight: bold; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #1e88e5; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; background: #e3f2fd; border: none; cursor: pointer; font-size: 16px; font-weight: bold; color: #1e88e5; }
        .tab-btn.active { background: #1e88e5; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; }
        textarea { height: 100px; resize: none; }
        button { background-color: #1e88e5; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1565c0; }
        .box { padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #fafafa; border: 1px solid #ddd; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .item-details { background: white; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
        .item-details summary { padding: 12px; font-weight: bold; cursor: pointer; background: #fdfdfd; border-bottom: 1px solid #f0f0f0; outline: none; }
        .item-details[open] summary { background: #f5f5f5; }
        .hint-controls { display: flex; gap: 10px; margin-top: 10px; }
        .attendance-row { display: flex; align-items: center; margin-bottom: 6px; background: white; padding: 6px; border-radius: 6px; border: 1px solid #eaeaea; }
        .attendance-name { width: 90px; font-weight: bold; font-size: 13px; }
        .calendar-grid { display: flex; flex-wrap: wrap; gap: 4px; }
        .calendar-cell { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: #e0e0e0; border-radius: 4px; font-size: 9px; font-weight: bold; color: #777; }
        .calendar-cell.stamped { background: #4caf50; color: white; }
        .sos-alert { background: #ffebee; border: 2px solid #ef5350; padding: 10px; border-radius: 8px; color: #c62828; font-weight: bold; margin-bottom: 15px; display: none; animation: blink 1s linear infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .reset-btn { background: #757575; width: 100%; margin-top: 30px; }
        .reset-btn:hover { background: #424242; }
    </style>
</head>
<body>
    <div class="container">
        <h1>교사 대시보드</h1>
        <div id="currentDate" class="date-display"></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab1')">문제 출제소</button>
            <button class="tab-btn" onclick="switchTab('tab2')">모니터링 및 출석</button>
            <button class="tab-btn" onclick="switchTab('tab3')">AI 학급 분석</button>
        </div>
        <div id="tab1" class="tab-content active">
            <div class="box">
                <input type="text" id="topicInput" placeholder="주제를 입력하십시오.">
                <select id="difficultySelect">
                    <option value="하">난이도: 하 (명시적 오류 1개)</option>
                    <option value="중" selected>난이도: 중 (오류 개수 명시)</option>
                    <option value="상">난이도: 상 (복합 오류, 개수 비명시)</option>
                </select>
                <button onclick="generateProblem()" style="width: 100%;">AI 문제 생성</button>
                <div id="resultText" style="margin-top:15px; white-space:pre-wrap;"></div>
                <button id="copyBtn" style="display:none; margin-top:10px; background:#ff9800; width:100%;" onclick="copyToTransfer()">⬇️ 문제만 가져오기</button>
            </div>
            <div class="box">
                <textarea id="taskToStudent" placeholder="검토 후 전송하십시오."></textarea>
                <button id="sendBtn" style="background:#e53935; width:100%;">학생에게 전송</button>
            </div>
        </div>
        <div id="tab2" class="tab-content">
            <div id="sosAlert" class="sos-alert"></div>
            <div class="box">
                <h3 style="margin-top:0;" id="attendanceTitle">월간 미션 출석 현황</h3>
                <div id="teacherAttendanceBoard">로딩 중...</div>
            </div>
            <div class="box">
                <h3>학생 기록 관리</h3>
                <div class="filter-bar">
                    <input type="date" id="dateFilter" onchange="renderMonitorList()">
                    <select id="filterType" onchange="renderMonitorList()">
                        <option value="all">전체 기록</option>
                        <option value="answer">풀이 현황</option>
                        <option value="activity">활동 내용</option>
                        <option value="evaluation">평가 기록</option>
                    </select>
                    <input type="text" id="searchName" placeholder="이름 검색" oninput="renderMonitorList()">
                </div>
                <div id="monitorList">기록 데이터가 없습니다.</div>
            </div>
        </div>
        <div id="tab3" class="tab-content">
            <button id="analyzeBtn" style="width:100%;">AI 통합 분석 리포트 생성</button>
            <div id="analysisResult" class="box" style="margin-top:15px; white-space:pre-wrap; min-height:100px;">리포트 출력 공간</div>
        </div>
        <button class="reset-btn" onclick="resetAllData()">⚠️ 학급 데이터 전체 초기화</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDkZS6CPZwzj3Tyxe-6PuYCQrgRMl7ioqU", authDomain: "algowebapp-833f6.firebaseapp.com", projectId: "algowebapp-833f6", storageBucket: "algowebapp-833f6.firebasestorage.app", messagingSenderId: "519500102460", appId: "1:519500102460:web:655d740f7612cfe1ce7c39" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const API_KEY = "AQ.Ab8RN6ISRDlpHZwTRrXmqgmYyil6sH6gfZCJrz3GYNpIBN0A6A"; 

        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Seoul', year: 'numeric', month: 'numeric', day: 'numeric' });
        const parts = formatter.formatToParts(now);
        const kstYear = parseInt(parts.find(p => p.type === 'year').value);
        const kstMonth = parseInt(parts.find(p => p.type === 'month').value);
        const todayStr = `${kstYear}-${String(kstMonth).padStart(2,'0')}-${String(parts.find(p => p.type === 'day').value).padStart(2,'0')}`;
        
        document.getElementById('dateFilter').value = todayStr;
        document.getElementById('currentDate').innerText = `${kstYear}년 ${kstMonth}월 ${parts.find(p => p.type === 'day').value}일 (서울 기준)`;

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        };

        // 데이터 수집용 전역 변수
        let rawAnswers = []; let rawActivities = []; let rawEvals = [];

        onSnapshot(collection(db, "answers"), (snap) => { rawAnswers = []; snap.forEach(d => { let data = d.data(); data.id = d.id; rawAnswers.push(data); }); });
        onSnapshot(collection(db, "activities"), (snap) => { rawActivities = []; snap.forEach(d => rawActivities.push(d.data())); });
        onSnapshot(collection(db, "evaluations"), (snap) => { rawEvals = []; snap.forEach(d => rawEvals.push(d.data())); });

        // AI 통합 분석 리포트 생성 (최종 수정본)
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const resDiv = document.getElementById('analysisResult');
            const total = rawAnswers.length + rawActivities.length + rawEvals.length;
            resDiv.innerText = `분석 준비 중... (총 데이터 ${total}건 확인)`;

            if (total === 0) {
                resDiv.innerText = "분석할 데이터가 없습니다.";
                return;
            }

            try {
                const promptData = `학생 답변: ${JSON.stringify(rawAnswers)}, 모둠활동: ${JSON.stringify(rawActivities)}, 상호평가: ${JSON.stringify(rawEvals)}`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: "교사 보조 데이터 분석가로서 학생들의 해결 유무 비율, 공통적인 알고리즘 논리 오류 패턴, 상호 평가 평정 점수 추이를 요약하고 개선안을 보고서 형태로 도출하십시오." }] },
                        contents: [{ role: "user", parts: [{ text: promptData }] }]
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { resDiv.innerText = "분석 오류: " + e.message; }
        });
        
        // ... (나머지 문제 생성 및 모니터링 함수들은 이전과 동일하게 유지)
    </script>
</body>
</html>
